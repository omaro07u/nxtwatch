    <link rel="stylesheet" href="css/base.css">

<body>

    <!-- شريط التنقل القياسي الموحد -->
    <nav class="navbar">
        <div class="logo">NXT<span>WATCH</span></div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="comparison.html">Comparison</a></li>
            <li><a href="watchlist.html">Watchlist</a></li>

        </ul>
        <div class="navbar-right">

    <!-- قسم الهيرو (يأتي بعد الشريط) -->
   <!-- قسم الهيرو (يأتي بعد الشريط) -->
<header class="hero-section-home">

        <!-- تريلر سينمائي HD من نفس السيرفر المضمون -->
        <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
    </video>
    
    <div class="hero-video-overlay"></div>

    <div class="hero-content">
        <h1 class="mega-title">NXTWATCH</h1>
        <div class="search-box-hero">
            <input type="text" id="globalSearchInput" placeholder="Search for movies...">
            <button id="heroSearchBtn">SEARCH</button>
        </div>
    </div>
</header>
    <section class="suggested-section">
        <h2 class="section-title"> Recommended for you</h2>
        <div id="suggestedGrid" class="movie-grid"></div>
    </section>

    <main>
        <div id="searchResultsArea" style="display: none;">
            <h2 class="section-title" id="searchResultTitle">loading results</h2>
            <div id="movieGrid" class="movie-grid"></div>
        </div>
    </main>

    <footer>
        <p>© 2025 NxtWatch — cinematic experience powered by OMDb</p>
